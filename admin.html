<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — Жанулька</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 16px;
      color: #f4eee6;
      background:
        radial-gradient(circle at top, rgba(120,70,160,0.18), transparent 35%),
        linear-gradient(135deg, #07070a, #140b18 45%, #030304);
      font-family: Georgia, serif;
    }

    .box {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 32px;
      border-radius: 26px;
      background: rgba(8,8,12,0.45);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 0 40px rgba(180,120,255,0.08),
        0 24px 80px rgba(0,0,0,0.45);
    }

    h1, h2 { text-align: center; margin-top: 0; }

    .small {
      text-align: center;
      opacity: 0.65;
      font-size: 14px;
      margin-top: 10px;
    }

    input {
      width: 100%;
      margin-top: 10px;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.25);
      color: #f4eee6;
      font-size: 15px;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      background: rgba(255,255,255,0.07);
      color: #f4eee6;
      font-size: 16px;
      font-family: Georgia, serif;
      cursor: pointer;
      transition: 0.25s;
    }

    button:hover { background: rgba(255,255,255,0.14); }
    .danger:hover { background: rgba(255,80,80,0.22); }
    .approve:hover { background: rgba(80,255,120,0.18); }

    .auth-grid,
    .buttons,
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .tabs {
      grid-template-columns: repeat(4, 1fr);
      margin-bottom: 20px;
    }

    .tab-btn.active { background: rgba(255,255,255,0.18); }

    .item {
      margin-top: 18px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .title {
      font-weight: 700;
      color: #f1c9ff;
      margin-bottom: 8px;
    }

    .text {
      line-height: 1.6;
      opacity: 0.9;
      white-space: pre-wrap;
    }

    .meta {
      margin-top: 10px;
      opacity: 0.5;
      font-size: 13px;
      word-break: break-all;
    }

    #adminPanel,
    #blocked { display: none; }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .email {
      opacity: 0.75;
      font-size: 14px;
    }

    .logout {
      max-width: 160px;
      margin-top: 0;
    }

    @media (max-width: 700px) {
      .buttons,
      .auth-grid,
      .tabs { grid-template-columns: 1fr; }
      .box { padding: 22px; }
      .logout { max-width: none; }
    }
  </style>
</head>

<body>

  <div class="box" id="login">
    <h2>🔒 Вход в админку</h2>

    <button id="googleLoginBtn">Войти через Google</button>

    <input id="emailInput" type="email" placeholder="Email">
    <input id="passwordInput" type="password" placeholder="Пароль">

    <div class="auth-grid">
      <button id="emailLoginBtn">Войти по почте</button>
      <button id="emailRegisterBtn">Регистрация</button>
    </div>

    <div class="small">
      Доступ разрешён только администратору: dobrovolec1234@gmail.com
    </div>
  </div>

  <div class="box" id="blocked">
    <h2>⛔ Доступ запрещён</h2>
    <div class="small">Этот аккаунт не является администратором.</div>
    <button id="logoutBtnBlocked">Выйти</button>
  </div>

  <div class="box" id="adminPanel">
    <div class="topbar">
      <div>
        <h1>Админка</h1>
        <div class="email" id="adminEmail"></div>
      </div>

      <button class="logout" id="logoutBtn">Выйти</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="messagesPendingBtn">⏳ Пожелания</button>
      <button class="tab-btn" id="messagesApprovedBtn">✅ Одобренные</button>
      <button class="tab-btn" id="storiesPendingBtn">📖 Истории</button>
      <button class="tab-btn" id="storiesApprovedBtn">📚 Опубликованные</button>
    </div>

    <div id="items"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";

    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

    import {
      getDatabase,
      ref,
      onValue,
      update,
      remove
    } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";

    const ADMIN_EMAIL = "dobrovolec1234@gmail.com";

    const firebaseConfig = {
      apiKey: "AIzaSyAnBQnt8bK-3G0zjNyIQsLY5s-_rjIV2Mk",
      authDomain: "a-letter-for-zhanulka.firebaseapp.com",
      databaseURL: "https://a-letter-for-zhanulka-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "a-letter-for-zhanulka",
      storageBucket: "a-letter-for-zhanulka.firebasestorage.app",
      messagingSenderId: "479179895784",
      appId: "1:479179895784:web:7f3bcd70ed9070c0816a5d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let mode = "messages";
    let statusFilter = "pending";

    const login = document.getElementById("login");
    const blocked = document.getElementById("blocked");
    const adminPanel = document.getElementById("adminPanel");
    const itemsBox = document.getElementById("items");
    const adminEmail = document.getElementById("adminEmail");

    document.getElementById("googleLoginBtn").addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        alert("Ошибка входа: " + error.message);
      }
    });

    document.getElementById("emailLoginBtn").addEventListener("click", async () => {
      const email = document.getElementById("emailInput").value.trim();
      const password = document.getElementById("passwordInput").value;

      if (!email || !password) {
        alert("Введи email и пароль");
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        alert("Ошибка входа: " + error.message);
      }
    });

    document.getElementById("emailRegisterBtn").addEventListener("click", async () => {
      const email = document.getElementById("emailInput").value.trim();
      const password = document.getElementById("passwordInput").value;

      if (!email || password.length < 6) {
        alert("Пароль должен быть минимум 6 символов");
        return;
      }

      try {
        await createUserWithEmailAndPassword(auth, email, password);
      } catch (error) {
        alert("Ошибка регистрации: " + error.message);
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      location.reload();
    });

    document.getElementById("logoutBtnBlocked").addEventListener("click", async () => {
      await signOut(auth);
      location.reload();
    });

    document.getElementById("messagesPendingBtn").addEventListener("click", () => setMode("messages", "pending", "messagesPendingBtn"));
    document.getElementById("messagesApprovedBtn").addEventListener("click", () => setMode("messages", "approved", "messagesApprovedBtn"));
    document.getElementById("storiesPendingBtn").addEventListener("click", () => setMode("stories", "pending", "storiesPendingBtn"));
    document.getElementById("storiesApprovedBtn").addEventListener("click", () => setMode("stories", "approved", "storiesApprovedBtn"));

    function setMode(newMode, newStatus, buttonId) {
      mode = newMode;
      statusFilter = newStatus;

      document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
      document.getElementById(buttonId).classList.add("active");

      loadItems();
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        login.style.display = "block";
        blocked.style.display = "none";
        adminPanel.style.display = "none";
        return;
      }

      if (user.email !== ADMIN_EMAIL) {
        login.style.display = "none";
        blocked.style.display = "block";
        adminPanel.style.display = "none";
        return;
      }

      login.style.display = "none";
      blocked.style.display = "none";
      adminPanel.style.display = "block";

      adminEmail.textContent = "Вы вошли как: " + user.email;

      loadItems();
    });

    function loadItems() {
      onValue(ref(db, mode), (snapshot) => {
        itemsBox.innerHTML = "";

        const data = snapshot.val();

        if (!data) {
          itemsBox.innerHTML = "<div class='small'>Пока ничего нет.</div>";
          return;
        }

        const filtered = Object.entries(data)
          .filter(([id, item]) => item.status === statusFilter)
          .sort((a, b) => (b[1].createdAt || b[1].approvedAt || 0) - (a[1].createdAt || a[1].approvedAt || 0));

        if (filtered.length === 0) {
          itemsBox.innerHTML = "<div class='small'>В этом разделе пусто.</div>";
          return;
        }

        filtered.forEach(([id, item]) => {
          const div = document.createElement("div");
          div.className = "item";

          const isStory = mode === "stories";
          const title = isStory
            ? "📖 " + (item.title || "Без названия")
            : "👤 " + (item.nickname || "Гость");

          const text = isStory ? (item.text || "") : (item.text || "");

          div.innerHTML = `
            <div class="title">${escapeHTML(title)}</div>
            ${isStory ? `<div class="meta">Автор: ${escapeHTML(item.nickname || "Гость")}</div>` : ""}
            <div class="text">${escapeHTML(text)}</div>

            <div class="meta">
              Статус: ${escapeHTML(item.status || "unknown")}<br>
              ID: ${escapeHTML(id)}<br>
              ID пользователя: ${escapeHTML(item.userId || "unknown")}
            </div>

            <div class="buttons">
              ${item.status !== "approved" ? `
                <button class="approve" onclick="approveItem('${id}')">✅ Одобрить</button>
              ` : ""}

              <button class="danger" onclick="deleteItem('${id}')">❌ Удалить</button>
            </div>
          `;

          itemsBox.appendChild(div);
        });
      });
    }

    window.approveItem = async function(id) {
      await update(ref(db, mode + "/" + id), {
        status: "approved",
        approvedAt: Date.now()
      });
    };

    window.deleteItem = async function(id) {
      if (confirm("Удалить?")) {
        await remove(ref(db, mode + "/" + id));
      }
    };

    function escapeHTML(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>

</body>
</html>
